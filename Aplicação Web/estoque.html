<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Atualizar Estoque - DOA.ME</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

}

body{

background:#f5f7fb;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

position:relative;

}

.top-buttons{

position:absolute;

top:25px;

left:25px;

right:25px;

display:flex;

justify-content:space-between;

}

.nav-btn{

padding:12px 18px;

border:none;

border-radius:12px;

background:white;

color:#780000;

font-weight:600;

cursor:pointer;

box-shadow:

0 4px 12px rgba(
0,0,0,.15
);

transition:.3s;

}

.nav-btn:hover{

transform:
translateY(-2px);

}

.logout{

background:#c1121f;

color:white;

}

.logout:hover{

background:#9b0d17;

}

.container{

width:100%;

max-width:850px;

background:white;

padding:40px;

border-radius:24px;

box-shadow:

0 10px 30px rgba(
0,0,0,.08
);

}

.logo{

text-align:center;

font-size:40px;

font-weight:700;

color:#780000;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#6b7280;

margin-bottom:40px;

}

#estoqueForm{

display:grid;

grid-template-columns:

repeat(
2,
1fr
);

gap:20px;

}

.input-card{

display:flex;

flex-direction:column;

gap:8px;

}

label{

font-weight:600;

color:#374151;

}

input{

padding:14px;

border:
1px solid #d1d5db;

border-radius:12px;

font-size:15px;

transition:.3s;

}

input:focus{

outline:none;

border-color:#c1121f;

box-shadow:

0 0 0 4px

rgba(
193,
18,
31,
0.10
);

}

.save-btn{

grid-column:

1 / 3;

margin-top:20px;

padding:16px;

border:none;

border-radius:14px;

background:#c1121f;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.save-btn:hover{

background:#9b0d17;

}

@media(max-width:700px){

#estoqueForm{

grid-template-columns:
1fr;

}

.save-btn{

grid-column:auto;

}

.top-buttons{

top:15px;

left:15px;

right:15px;

}

}

</style>

</head>

<body>

<div class="top-buttons">

<button
class="nav-btn logout"
id="logoutBtn">

Logout

</button>

</div>

<div class="container">

<div class="logo">

DOA.ME

</div>

<p class="subtitle">

Atualize quantas bolsas de sangue tem no estoque do hemocentro

</p>

<form id="estoqueForm">

<div class="input-card">

<label>A+</label>

<input
type="number"
id="Aplus"
min="0"
required>

</div>

<div class="input-card">

<label>A-</label>

<input
type="number"
id="Aminus"
min="0"
required>

</div>

<div class="input-card">

<label>B+</label>

<input
type="number"
id="Bplus"
min="0"
required>

</div>

<div class="input-card">

<label>B-</label>

<input
type="number"
id="Bminus"
min="0"
required>

</div>

<div class="input-card">

<label>AB+</label>

<input
type="number"
id="ABplus"
min="0"
required>

</div>

<div class="input-card">

<label>AB-</label>

<input
type="number"
id="ABminus"
min="0"
required>

</div>

<div class="input-card">

<label>O+</label>

<input
type="number"
id="Oplus"
min="0"
required>

</div>

<div class="input-card">

<label>O-</label>

<input
type="number"
id="Ominus"
min="0"
required>

</div>

<button class="save-btn">

Salvar Estoque

</button>

</form>

</div>

<script
type="module"
src="js/estoque.js">

</script>

</body>

</html>
