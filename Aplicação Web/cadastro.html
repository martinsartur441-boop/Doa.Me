<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Cadastro DOA.ME</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#c1121f,
#780000
);

padding:20px;

position:relative;

}

.back-btn{

position:absolute;

top:25px;

left:25px;

padding:12px 18px;

border:none;

border-radius:12px;

background:white;

color:#780000;

font-weight:600;

cursor:pointer;

box-shadow:
0 4px 12px rgba(
0,0,0,.15
);

transition:.3s;

}

.back-btn:hover{

transform:
translateY(-2px);

}

.container{

width:100%;
max-width:520px;

background:white;

padding:40px;

border-radius:24px;

box-shadow:
0 10px 35px rgba(
0,0,0,.2
);

}

.logo{

text-align:center;

font-size:42px;

font-weight:700;

color:#780000;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#6b7280;

margin-bottom:35px;

line-height:1.6;

}

#cadastroForm{

display:flex;

flex-direction:column;

gap:18px;

}

input,
select{

padding:16px;

border:
1px solid #ddd;

border-radius:14px;

font-size:15px;

transition:.3s;

background:white;

}

input:focus,
select:focus{

outline:none;

border-color:#c1121f;

box-shadow:
0 0 0 4px
rgba(
193,
18,
31,
0.12
);

}

button{

padding:16px;

border:none;

border-radius:14px;

background:#c1121f;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#9b0d17;

}

.footer{

margin-top:25px;

text-align:center;

color:#6b7280;

}

.footer a{

color:#c1121f;

text-decoration:none;

font-weight:600;

}

</style>

</head>

<body>

<button
class="back-btn"
onclick="history.back()">

← Voltar

</button>

<div class="container">

<div class="logo">

DOA.ME

</div>

<p class="subtitle">

Cadastre seu hemocentro para
atualizar estoques em tempo real

</p>

<form id="cadastroForm">

<input
type="text"
id="nome"
placeholder="Nome do Hemocentro"
required>


<input
type="email"
id="email"
placeholder="Email Institucional"
required>


<select
id="estado"
required>

<option
value=""
disabled
selected>

Selecione seu Estado

</option>

<option value="Bahia">

Bahia

</option>

</select>


<select
id="cidade"
required>

<option
value=""
disabled
selected>

Selecione a Cidade

</option>

<option value="Feira de Santana">

Feira de Santana

</option>

<option value="Salvador">

Salvador

</option>

</select>


<input
type="password"
id="senha"
placeholder="Senha"
required>


<input
type="password"
id="confirmarSenha"
placeholder="Confirme sua senha"
required>


<button>

Cadastrar Hemocentro

</button>

</form>

<div class="footer">

Já possui conta?

<a href="login.html">

Entrar

</a>

</div>

</div>

<script
type="module"
src="js/cadastro.js">

</script>

</body>

</html>
