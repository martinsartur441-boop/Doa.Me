<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>DOA.ME - Estoques Públicos</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

}

body{

background:#f5f7fb;

min-height:100vh;

}

header{

background:

linear-gradient(
135deg,
#c1121f,
#780000
);

padding:25px 8%;

color:white;

box-shadow:

0 4px 12px rgba(
0,0,0,.15
);

}

.header-top{

display:flex;

align-items:center;

gap:20px;

margin-bottom:12px;

}

.back-btn{

padding:12px 18px;

border:none;

border-radius:12px;

background:white;

color:#780000;

font-weight:600;

cursor:pointer;

transition:.3s;

box-shadow:

0 4px 12px rgba(
0,0,0,.15
);

}

.back-btn:hover{

transform:

translateY(-2px);

}

.logo{

font-size:34px;

font-weight:700;

}

.subtitle{

opacity:.9;

}

.container{

padding:50px 8%;

}

h2{

margin-bottom:25px;

color:#780000;

}

.regiao{

background:white;

padding:28px;

margin-bottom:30px;

border-radius:22px;

box-shadow:

0 8px 25px rgba(
0,0,0,.06
);

}

.regiao h3{

margin-bottom:25px;

font-size:28px;

color:#780000;

}

.grid{

display:grid;

grid-template-columns:

repeat(
4,
1fr
);

gap:20px;

}

.card{

background:#f9fafb;

padding:20px;

border-radius:16px;

text-align:center;

border-left:

6px solid #c1121f;

transition:.3s;

}

.card:hover{

transform:

translateY(-4px);

}

.card h4{

font-size:28px;

color:#780000;

margin-bottom:10px;

}

.card p{

font-size:18px;

font-weight:600;

color:#4b5563;

}

@media(max-width:900px){

.grid{

grid-template-columns:

repeat(
2,
1fr
);

}

}

@media(max-width:600px){

.grid{

grid-template-columns:

1fr;

}

.container{

padding:30px 20px;

}

header{

padding:25px;

}

.header-top{

flex-direction:column;

align-items:flex-start;

gap:15px;

}

.logo{

font-size:30px;

}

}

</style>

</head>

<body>

<header>

<div class="header-top">

<button
class="back-btn"
onclick="history.back()">

← Voltar

</button>

<div class="logo">

DOA.ME

</div>

</div>

<p class="subtitle">

Visualize os estoques regionais em tempo real

</p>

</header>

<div class="container">

<h2>

Estoque Regional

</h2>

<div id="regioes"></div>

</div>

<script
type="module"
src="js/publico.js">

</script>

</body>

</html>
